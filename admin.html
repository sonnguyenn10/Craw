<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển - Web Crawler</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #3498db;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            transition: 0.2s border;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .split {
            display: flex;
            gap: 15px;
        }
        .split .form-group {
            flex: 1;
        }

        button.btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.btn-submit:hover {
            background-color: #27ae60;
        }

        button.btn-submit:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        #status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
            word-wrap: break-word;
        }

        .status-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-loading {
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>⚙️ Bảng Điều Khiển Auto Crawl</h1>

        <form id="crawlForm">
            <div class="form-group">
                <label for="base">Base URL (Mặc định)</label>
                <input type="text" id="base" required>
            </div>

            <div class="form-group">
                <label for="thread">Thread Link (Ví dụ: /threads/pru212...)</label>
                <input type="text" id="thread" placeholder="Nhập đường dẫn chứa đề thi" required>
            </div>

            <div class="split">
                <div class="form-group">
                    <label for="xf_user">Cookie: xf_user</label>
                    <input type="text" id="xf_user" placeholder="18815%2C..." required>
                </div>
                <div class="form-group">
                    <label for="xf_session">Cookie: xf_session</label>
                    <input type="text" id="xf_session" placeholder="eODIQm..." required>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">🚀 BẮT ĐẦU CRAWL DỮ LIỆU</button>
        </form>

        <div id="status-box"></div>

        <div class="links">
            <a href="/">&laquo; Trở về Trang Luyện Tập (Quiz)</a>
        </div>
    </div>

    <script>
        // Load data from LocalStorage
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('base').value = localStorage.getItem('crawl_base') || 'https://fuoverflow.com';
            document.getElementById('thread').value = localStorage.getItem('crawl_thread') || '';
            document.getElementById('xf_user').value = localStorage.getItem('crawl_xf_user') || '';
            document.getElementById('xf_session').value = localStorage.getItem('crawl_xf_session') || '';
        });

        // Handle Form Submit
        document.getElementById('crawlForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const base = document.getElementById('base').value.trim();
            const thread = document.getElementById('thread').value.trim();
            const xf_user = document.getElementById('xf_user').value.trim();
            const xf_session = document.getElementById('xf_session').value.trim();

            // Save to LocalStorage
            localStorage.setItem('crawl_base', base);
            localStorage.setItem('crawl_thread', thread);
            localStorage.setItem('crawl_xf_user', xf_user);
            localStorage.setItem('crawl_xf_session', xf_session);

            const btn = document.getElementById('btnSubmit');
            const statusBox = document.getElementById('status-box');

            // UI Loading state
            btn.disabled = true;
            btn.innerHTML = 'ĐANG XỬ LÝ... VUI LÒNG ĐỢI...';
            statusBox.style.display = 'block';
            statusBox.className = 'status-loading';
            statusBox.innerHTML = '<span class="spinner"></span>Hệ thống đang chạy ngầm tải ảnh và tổng hợp text. Hãy theo dõi console của Python nếu cần chi tiết...';

            try {
                const response = await fetch('/api/crawl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base: base,
                        thread: thread,
                        xf_user: xf_user,
                        xf_session: xf_session
                    })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusBox.className = 'status-success';
                    statusBox.innerHTML = `<strong>Thành công!</strong> Đã tải ${result.images} ảnh. <br>Lưu tại: <code>${result.path}</code><br>Bạn có thể trở về trang Quiz và bấm TẢI ĐỀ LÊN.`;
                } else {
                    throw new Error(result.message || 'Lỗi không xác định từ Server');
                }
            } catch (err) {
                statusBox.className = 'status-error';
                statusBox.innerHTML = `<strong>Lỗi:</strong> ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 BẮT ĐẦU CRAWL DỮ LIỆU';
            }
        });
    </script>
</body>
</html>
