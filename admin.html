<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển - Web Crawler</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .admin-container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #3498db;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
            transition: 0.2s border;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3498db;
        }

        .split {
            display: flex;
            gap: 15px;
        }
        .split .form-group {
            flex: 1;
        }

        button.btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button.btn-submit:hover {
            background-color: #27ae60;
        }

        button.btn-submit:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .links {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        #status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
            word-wrap: break-word;
        }

        .status-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-loading {
            background-color: #e2e3e5;
            color: #383d41;
            border: 1px solid #d6d8db;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>⚙️ Bảng Điều Khiển Auto Crawl</h1>

        <form id="crawlForm">
            <div class="form-group">
                <label for="base">Base URL (Mặc định)</label>
                <input type="text" id="base" required>
            </div>

            <div class="form-group">
                <label for="thread">Thread Link (Ví dụ: /threads/pru212...)</label>
                <input type="text" id="thread" placeholder="Nhập đường dẫn chứa đề thi" required>
            </div>

            <div class="split">
                <div class="form-group">
                    <label for="xf_user">Cookie: xf_user</label>
                    <input type="text" id="xf_user" placeholder="18815%2C..." required>
                </div>
                <div class="form-group">
                    <label for="xf_session">Cookie: xf_session</label>
                    <input type="text" id="xf_session" placeholder="eODIQm..." required>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">🚀 BẮT ĐẦU CRAWL DỮ LIỆU</button>
        </form>

        <div id="status-box"></div>

        <div class="links">
            <a href="/">&laquo; Trở về Trang Luyện Tập (Quiz)</a>
        </div>
        
        <hr style="margin: 30px 0; border: 1px solid #eee;">
        
        <h1>📂 Quản Lý Đề Thi</h1>
        <div class="form-group">
            <label for="manage-subject">Chọn Môn Học:</label>
            <select id="manage-subject" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></select>
        </div>
        <div class="form-group">
            <label for="manage-thread">Chọn Đề:</label>
            <select id="manage-thread" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></select>
        </div>

        <div class="split">
            <div class="form-group">
                <label for="manage-new-subject">Chuyển sang môn:</label>
                <input type="text" id="manage-new-subject" placeholder="Ví dụ: prn222">
            </div>
            <div class="form-group">
                <label for="manage-new-category">Phân loại:</label>
                <select id="manage-new-category" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="pe">PE</option>
                    <option value="fe">FE</option>
                    <option value="other">Other</option>
                </select>
            </div>
        </div>
        
        <button id="btnMove" class="btn-submit" style="background-color: #f39c12;">🚀 DI CHUYỂN ĐỀ THI</button>
        <div id="move-status-box" style="margin-top: 15px; padding: 10px; border-radius: 5px; display: none;"></div>

    </div>

    <script>
        let indexData = null;

        // Load data from LocalStorage
        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('base').value = localStorage.getItem('crawl_base') || 'https://fuoverflow.com';
            document.getElementById('thread').value = localStorage.getItem('crawl_thread') || '';
            document.getElementById('xf_user').value = localStorage.getItem('crawl_xf_user') || '';
            document.getElementById('xf_session').value = localStorage.getItem('crawl_xf_session') || '';

            await loadIndexData();
        });

        async function loadIndexData() {
            try {
                const response = await fetch('./images/index.json?t=' + new Date().getTime());
                indexData = await response.json();
                
                const subjectSelect = document.getElementById('manage-subject');
                subjectSelect.innerHTML = '<option value="">-- Chọn Môn --</option>';
                for (const subject of Object.keys(indexData)) {
                    const option = document.createElement('option');
                    option.value = subject;
                    option.textContent = subject.toUpperCase();
                    subjectSelect.appendChild(option);
                }
            } catch (err) {
                console.error("Lỗi khi load index.json: ", err);
            }
        }

        document.getElementById('manage-subject').addEventListener('change', (e) => {
            const subject = e.target.value;
            const threadSelect = document.getElementById('manage-thread');
            threadSelect.innerHTML = '<option value="">-- Chọn Đề --</option>';
            document.getElementById('manage-new-subject').value = subject;

            if (!subject) return;

            const categories = indexData[subject];
            for (const [category, threads] of Object.entries(categories)) {
                const optgroup = document.createElement('optgroup');
                optgroup.label = category.toUpperCase();
                for (const [thread, data] of Object.entries(threads)) {
                    const option = document.createElement('option');
                    option.value = JSON.stringify({subject, category, thread});
                    option.textContent = data.title;
                    optgroup.appendChild(option);
                }
                threadSelect.appendChild(optgroup);
            }
        });

        document.getElementById('manage-thread').addEventListener('change', (e) => {
            if(!e.target.value) return;
            const d = JSON.parse(e.target.value);
            document.getElementById('manage-new-category').value = d.category;
        });

        document.getElementById('btnMove').addEventListener('click', async () => {
            const threadVal = document.getElementById('manage-thread').value;
            if (!threadVal) {
                alert("Vui lòng chọn đề cần di chuyển!");
                return;
            }
            const d = JSON.parse(threadVal);
            
            const newSubject = document.getElementById('manage-new-subject').value.trim().toLowerCase();
            const newCategory = document.getElementById('manage-new-category').value;
            
            if (!newSubject) {
                alert("Vui lòng nhập tên môn mới!");
                return;
            }

            const moveStatusBox = document.getElementById('move-status-box');
            moveStatusBox.style.display = 'block';
            moveStatusBox.className = 'status-loading';
            moveStatusBox.innerHTML = 'Đang xử lý...';

            try {
                const response = await fetch('/api/move_thread', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: d.subject,
                        category: d.category,
                        thread: d.thread,
                        new_subject: newSubject,
                        new_category: newCategory
                    })
                });

                const result = await response.json();
                if (response.ok && result.status === 'success') {
                    moveStatusBox.className = 'status-success';
                    moveStatusBox.innerHTML = `<strong>Thành công!</strong> ${result.message}`;
                    await loadIndexData(); // Tải lại dũ liệu
                    document.getElementById('manage-thread').innerHTML = '<option value="">-- Chọn Đề --</option>';
                    document.getElementById('manage-subject').value = newSubject;
                    // Trigger change manually
                    document.getElementById('manage-subject').dispatchEvent(new Event('change'));
                } else {
                    throw new Error(result.message || 'Lỗi từ Server');
                }
            } catch (err) {
                moveStatusBox.className = 'status-error';
                moveStatusBox.innerHTML = `<strong>Lỗi:</strong> ${err.message}`;
            }
        });

        // Handle Form Submit
        document.getElementById('crawlForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const base = document.getElementById('base').value.trim();
            const thread = document.getElementById('thread').value.trim();
            const xf_user = document.getElementById('xf_user').value.trim();
            const xf_session = document.getElementById('xf_session').value.trim();

            // Save to LocalStorage
            localStorage.setItem('crawl_base', base);
            localStorage.setItem('crawl_thread', thread);
            localStorage.setItem('crawl_xf_user', xf_user);
            localStorage.setItem('crawl_xf_session', xf_session);

            const btn = document.getElementById('btnSubmit');
            const statusBox = document.getElementById('status-box');

            // UI Loading state
            btn.disabled = true;
            btn.innerHTML = 'ĐANG XỬ LÝ... VUI LÒNG ĐỢI...';
            statusBox.style.display = 'block';
            statusBox.className = 'status-loading';
            statusBox.innerHTML = '<span class="spinner"></span>Hệ thống đang chạy ngầm tải ảnh và tổng hợp text. Hãy theo dõi console của Python nếu cần chi tiết...';

            try {
                const response = await fetch('/api/crawl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        base: base,
                        thread: thread,
                        xf_user: xf_user,
                        xf_session: xf_session
                    })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    statusBox.className = 'status-success';
                    const filesStr = result.files ? `, ${result.files} file đính kèm` : '';
                    statusBox.innerHTML = `<strong>Thành công!</strong> Đã tải ${result.images} ảnh${filesStr}. <br>Lưu tại: <code>${result.path}</code><br>Bạn có thể trở về trang Quiz và bấm TẢI ĐỀ LÊN.`;
                } else {
                    throw new Error(result.message || 'Lỗi không xác định từ Server');
                }
            } catch (err) {
                statusBox.className = 'status-error';
                statusBox.innerHTML = `<strong>Lỗi:</strong> ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 BẮT ĐẦU CRAWL DỮ LIỆU';
            }
        });
    </script>
</body>
</html>
